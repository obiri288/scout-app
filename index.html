<!DOCTYPE html>
<html lang="de" class="dark">

<head>
  <meta charset="UTF-8" />
  <!-- Viewport optimiert für Modern Glass UI: Cover sorgt dafür, dass der Hintergrund bis in die Notch reicht -->
  <meta name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />

  <!-- Google Fonts removed for GDPR compliance. Fonts are now imported locally via @fontsource in the main entry file. -->

  <title>CAVIO - Digital Player Profile</title>
  <meta name="description" content="Cavio – Die Plattform für junge Athleten, die gesehen werden wollen. Präsentiere dein Talent, werde entdeckt.">

  <!-- --- PWA KONFIGURATION --- -->
  <link rel="manifest" href="/manifest.json">

  <!-- Theme Color auf Schwarz gesetzt für nahtlosen Look -->
  <meta name="theme-color" content="#000000">

  <!-- iOS Einstellungen -->
  <link rel="apple-touch-icon" href="/cavio-icon.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Cavio">

  <link rel="icon" type="image/png" href="/cavio-icon.png" />

  <!-- CSS SETUP -->
  <style>
    html {
      /* Erzwingt vertikale Scrollbalken für natives Feeling */
      overflow-y: scroll !important;
      height: 100% !important;
      background-color: #0b0f1a;
    }

    body {
      /* WICHTIG: Erlaubt Scrolling, verhindert "Gummiband"-Effekt am Body */
      position: relative !important;
      overflow-y: auto !important;
      overflow-x: hidden !important;
      min-height: 100vh !important;
      margin: 0 !important;
      padding: 0 !important;
      background-color: #0b0f1a;
      /* Deep Black für Glassmorphism */
      color: #ffffff;

      /* Verbessert Klicks auf Mobile */
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
      -webkit-font-smoothing: antialiased;
    }

    #root {
      /* Stellt sicher, dass die App den ganzen Screen füllt */
      min-height: 100vh;
      display: flex;
      flex-direction: column;

      /* WICHTIG FÜR IPHONE X/11/12+ NOTCH */
      /* Damit die schwebende Navigation nicht vom Home-Balken verdeckt wird */
      padding-top: env(safe-area-inset-top);
      padding-bottom: env(safe-area-inset-bottom);
      padding-left: env(safe-area-inset-left);
      padding-right: env(safe-area-inset-right);
    }
  </style>
</head>

<body>
  <div id="root"></div>

  <script type="module" src="/src/main.jsx"></script>
</body>

</html>
